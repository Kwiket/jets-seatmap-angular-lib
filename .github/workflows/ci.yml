name: CI

on:
  push:
    branches: [main, demo, release]
  pull_request:
    branches: [main, demo, release]

# Declare default permissions as read-only. Individual jobs may widen as needed.
permissions: read-all

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  build:
    name: Build library and demo
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Build demo
        run: npx ng build seatmap-demo --configuration production

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    # Dependabot PRs run without access to repository secrets by GitHub's
    # security policy, so SEATMAP_API_* would be empty and every e2e test
    # would fail at the auth step. Skip — dep bumps don't touch the API
    # contract, and e2e re-runs on push to main after the bump is merged.
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: pw-version
        run: |
          ver=$(node -p "require('./node_modules/@playwright/test/package.json').version")
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: cache-browsers
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.cache-browsers.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install OS deps for cached browsers
        if: steps.cache-browsers.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Generate demo env-config.js
        # Intentionally do NOT pass FLIGHTS_API_URL — the e2e suite relies on
        # the hardcoded DEMO_FLIGHTS[0] (flight.id='demo'), a fixture the
        # sandbox API recognises. Sheet-loaded flights have IDs like 'qt888'
        # that the sandbox doesn't know about, so seats wouldn't render.
        run: npm run generate:env
        env:
          API_URL: ${{ secrets.SEATMAP_API_URL }}
          API_APP_ID: ${{ secrets.SEATMAP_API_APP_ID }}
          API_KEY: ${{ secrets.SEATMAP_API_KEY }}

      - name: Build library (consumed by demo dev-server)
        run: npm run build:lib

      - name: Verify seatmap API secrets are present
        run: |
          if [ -z "${{ secrets.SEATMAP_API_URL }}" ] || [ -z "${{ secrets.SEATMAP_API_APP_ID }}" ] || [ -z "${{ secrets.SEATMAP_API_KEY }}" ]; then
            echo "::error::SEATMAP_API_URL / SEATMAP_API_APP_ID / SEATMAP_API_KEY must be configured as repository secrets for e2e to run."
            exit 1
          fi

      - name: Run Playwright tests
        run: npm run e2e
        env:
          CI: '1'
          # FLIGHTS_API_URL is intentionally omitted — see generate:env step.
          API_URL: ${{ secrets.SEATMAP_API_URL }}
          API_APP_ID: ${{ secrets.SEATMAP_API_APP_ID }}
          API_KEY: ${{ secrets.SEATMAP_API_KEY }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: projects/seatmap-demo/e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-screenshots
          path: projects/seatmap-demo/e2e/**/screenshots/*.png
          if-no-files-found: ignore
          retention-days: 14
