version: 2
updates:
  # npm packages (root + library)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      angular:
        patterns:
          - "@angular/*"
          - ng-packagr
      dev-tooling:
        patterns:
          - vitest
          - prettier
          - typescript
          - jsdom
    ignore:
      # @angular/build 21.x requires typescript <6.0 — block TS major bumps
      # until Angular publishes a release that supports TypeScript 6.x.
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies

  # GitHub Actions versions in workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
