version: 2
updates:
  # npm packages (root + library)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      angular:
        patterns:
          - "@angular/*"
          - ng-packagr
      dev-tooling:
        patterns:
          - vitest
          - prettier
          - typescript
          - jsdom
    labels:
      - dependencies

  # GitHub Actions versions in workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
